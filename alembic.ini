[alembic]
script_location = migrations
sqlalchemy.url = postgresql+asyncpg://vibecrush:vibecrush@localhost:5432/vibecrush

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
